<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Multi-Agent Ctrl</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">A</span>
          <div>
            <strong>AI Multi-Agent Ctrl</strong>
            <span>Autonomous Control Plane</span>
          </div>
        </div>
        <nav class="nav" aria-label="管理视图">
          <button class="nav-item active" data-view="system">系统管理</button>
          <button class="nav-item" data-view="users">用户管理</button>
          <button class="nav-item" data-view="projects">项目总览</button>
          <button class="nav-item" data-view="tasks">任务组监控</button>
          <button class="nav-item" data-view="instructions">指令协议</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1 id="view-title">系统管理</h1>
            <p id="view-subtitle">系统级运行、初始化、审计、策略和安全控制</p>
          </div>
          <div class="topbar-actions">
            <button id="refresh" class="icon-button" title="刷新">↻</button>
            <button id="bootstrap" class="primary-button">重新初始化</button>
          </div>
        </header>

        <section id="status-line" class="status-line" aria-live="polite"></section>
        <section id="content" class="content-grid"></section>
      </main>
    </div>

    <template id="progress-template">
      <div class="progress">
        <span></span>
      </div>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
