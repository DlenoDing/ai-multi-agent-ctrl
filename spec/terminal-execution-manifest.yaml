  - "spec/state-machines.yaml"
  - "spec/state-machines.schema.json"
  - "spec/gates.yaml"
  - "spec/gate-catalog.schema.json"
  - "spec/agent-skill-source.schema.json"
  - "spec/agent-role-skill.schema.json"
  - "spec/model-capability.schema.json"
  - "spec/model-selection-policy.schema.json"
  - "spec/session-placement-policy.schema.json"
  - "spec/runtime-issue-pattern.schema.json"
  - "spec/system-upgrade-candidate.schema.json"
  - "spec/agent-task-contract.schema.json"
  - "spec/control-events.schema.json"
  - "spec/checkpoint.schema.json"
