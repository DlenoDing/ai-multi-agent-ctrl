schemaVersion: "terminal-execution-manifest/v1"
systemId: "ai-multi-agent-ctrl"
executionMode: "ai_agent_autonomous"
skillRoleSources:
  - sourceId: "agency-agents-zh"
    repositoryUrl: "https://github.com/DlenoDing/agency-agents-zh.git"
    defaultRef: "main"
    pinnedCommit: "1d2345927e4a70c426472c37771e31f9333d7e0a"
    catalogFiles:
      - "AGENT-LIST.md"
      - "CATALOG.md"
    roleFileGlobs:
      - "academic/**/*.md"
      - "design/**/*.md"
      - "engineering/**/*.md"
      - "finance/**/*.md"
      - "game-development/**/*.md"
      - "gis/**/*.md"
      - "hr/**/*.md"
      - "marketing/**/*.md"
      - "product/**/*.md"
      - "project-management/**/*.md"
      - "sales/**/*.md"
      - "writing/**/*.md"
    trustPolicy:
      requirePinnedCommit: true
      requireFrontmatter: true
      requireDigestIndex: true
      allowUnsignedContent: false
    syncPolicy:
      mode: "pinned_snapshot"
      refreshTrigger: "orchestrator_need"
      onUpstreamChange: "create_system_upgrade_candidate"
    overlayPolicy:
      defaultPrecedence:
        - "task_group_overlay"
        - "project_overlay"
        - "upstream_default"
      allowedScopes:
        - "project"
        - "task_group"
      requiresDecisionRecord: true
      requiresDigest: true
modelProviderPolicy:
  registryMode: "dynamic_provider_capability_probe"
  providerClasses:
    - "openai"
    - "anthropic"
    - "google"
    - "xai"
    - "meta"
    - "mistral"
    - "deepseek"
    - "qwen"
    - "moonshot"
    - "zhipu"
    - "baidu"
    - "tencent"
    - "openrouter"
    - "azure_openai"
    - "aws_bedrock"
    - "vertex_ai"
    - "ollama"
    - "vllm"
    - "custom"
  selectionBasis:
    - "role_skill_capability"
    - "task_required_capability"
    - "context_window"
    - "tool_use"
    - "structured_output"
    - "quality_signal"
    - "latency_signal"
    - "cost_signal"
    - "quota_signal"
    - "risk_level"
    - "data_boundary"
  decisionObject: "ModelSelectionDecision"
sessionPlacementPolicy:
  defaultPlacement: "new_session_for_sustained_work"
  decisionObject: "SessionPlacementDecision"
  capacityPolicy:
    maxSubagentsPerControllerSession: 4
    onSubagentLimitApproach: "start_new_session"
  sustainedWorkSignals:
    - "expected_multi_turn"
    - "long_running"
    - "stateful_context"
    - "role_owner_required"
    - "independent_work_owner"
    - "write_scope_owner"
    - "cross_file_or_cross_service_change"
    - "external_capability_flow"
    - "git_or_release_side_effect"
  shortTaskSignals:
    - "single_turn"
    - "read_only_scan"
    - "localized_search"
    - "format_only_change"
    - "no_persistent_state"
    - "no_global_task_ownership"
  placementRules:
    - ruleId: "sustained-role-work"
      placement: "new_session"
      whenAny:
        - "expected_multi_turn"
        - "long_running"
        - "role_owner_required"
        - "write_scope_owner"
    - ruleId: "short-contained-work"
      placement: "subagent"
      whenAll:
        - "single_turn"
        - "no_persistent_state"
        - "no_global_task_ownership"
    - ruleId: "subagent-limit-pressure"
      placement: "new_session"
      whenAny:
        - "subagent_limit_approaching"
        - "controller_context_pressure"
runtimeImprovementPolicy:
  mode: "collect_only_during_project_execution"
  candidateObject: "SystemUpgradeCandidate"
  issuePatternObject: "RuntimeIssuePattern"
  forbiddenRuntimeActions:
    - "mutate_active_ruleset"
    - "self_patch_control_plane"
    - "change_scheduler_policy"
    - "auto_publish_role_skill_overlay"
    - "auto_change_permission_policy"
    - "auto_expand_mcp_grant"
    - "create_runtime_self_upgrade_task_group"
    - "execute_system_upgrade_during_project_run"
  collectionTriggers:
    - "repeated_failure_fingerprint"
    - "repeated_permission_blocker"
    - "repeated_model_selection_failure"
    - "repeated_spec_drift"
    - "repeated_test_flake"
    - "repeated_review_finding"
  externalMaintenanceHandoff:
    - "cluster_issue_pattern"
    - "create_system_upgrade_candidate"
    - "export_upgrade_evidence_package"
    - "mark_system_external_maintenance_required"
    - "await_system_external_upgrade_import"
authorityModel:
  entryControllerSession:
    role: "objective_boundary_source"
    allowedActions:
      - "submit_objective"
      - "define_boundary"
      - "provide_external_capability_signal"
    forbiddenAsExecutionDependency: true
  adminConsole:
    role: "configuration_observation_surface"
    allowedActions:
      - "observe_state"
      - "configure_capability_registry"
      - "inspect_audit"
    forbiddenAsExecutionDependency: true
  orchestrator:
    role: "canonical_controller"
    closesTaskGroups: true
    ownsStateVersion: true
  decisionCenter:
    role: "ai_decision_quorum"
    emits: "DecisionRecord"
  policyEngine:
    role: "deterministic_policy_guard"
    blocksUnauthorizedSideEffects: true

nonNegotiableInvariants:
  - id: "no_non_system_execution_steps"
    rule: "Do not emit completion plans that require non-system execution paths to execute project work."
  - id: "database_is_canonical"
    rule: "PostgreSQL state, event log, checkpoint and artifact digest are authoritative."
  - id: "schema_before_execution"
    rule: "All machine actions must validate against schema before side effects."
  - id: "lease_before_write"
    rule: "Every write-side operation must hold an active project-level lease."
  - id: "idempotency_before_command"
    rule: "Every command and MCP write call must include idempotencyKey."
  - id: "independent_reverify"
    rule: "Implementation session cannot mark its own batch as reverified."
  - id: "permission_as_state"
    rule: "Permission blockers must become PermissionRequest objects."
  - id: "external_capability_boundary"
    rule: "External systems that forbid automation must be modeled as external capability boundaries, not bypassed."
  - id: "no_close_with_pending_security_objects"
    rule: "TaskGroup and WorkItem closure is forbidden while PermissionRequest, ApprovalRequest, PolicyDecision, Command, CommandEffect, DLQEntry, Lease, temporary grant, secret lease, or external capability blocker is non-terminal."
  - id: "external_capability_cannot_be_ai_approved"
    rule: "OS, OAuth, account login, UAC, Keychain, sudo, hardware key, payment, cloud, and production organization boundaries cannot be transformed into ordinary approval by AI quorum."
  - id: "grant_is_exact_and_expiring"
    rule: "Every tool, secret, git, network, service, and browser-session grant must bind project, taskGroup, workItem, session, agentNode, resource, action, parameter policy, expiresAt, revocationRef, and auditRef."
  - id: "policy_decision_is_recorded"
    rule: "Every command admission, MCP write call, permission grant, and approval decision must create an immutable PolicyDecision."
  - id: "approval_authorizes_only_exact_action"
    rule: "ApprovalRequest success releases only the exact command or diff referenced by the request."
  - id: "permission_request_must_converge"
    rule: "PermissionRequest must converge to resolved, rejected, reassigned, scope_reduced, aborted, expired, or external_capability_blocked before close."
  - id: "ambient_browser_session_forbidden"
    rule: "Browser session, device code, OAuth URL, and service account use must be registered capability grants with scope, expiry, evidence, and revocation."
  - id: "decision_record_is_immutable"
    rule: "DecisionRecord is append-only; changes require supersede and affected-work invalidation."
  - id: "high_risk_no_self_approval"
    rule: "High-risk actions cannot be approved only by the same session or role that proposed them."
  - id: "new_session_for_sustained_work"
    rule: "Scheduler must prefer a new WorkSession for sustained, multi-turn, stateful, write-owning, or role-owner work; subagents are reserved for short contained work."
  - id: "runtime_improvement_collect_only"
    rule: "Repeated runtime issues are collected as RuntimeIssuePattern and SystemUpgradeCandidate objects; active execution must not self-modify rules, policies, roles, grants, control-plane code, or create runtime self-upgrade task groups."

roles:
  - id: "orchestrator"
    kind: "ai_controller"
    responsibilities:
      - "project_intake"
      - "task_group_creation"
      - "dag_planning"
      - "session_scheduling"
      - "state_version_control"
      - "close_barrier_decision"
  - id: "decision-center"
    kind: "ai_agent_cluster"
    responsibilities:
      - "architecture_decision"
      - "risk_classification"
      - "conflict_resolution"
      - "policy_exception_decision"
  - id: "scheduler"
    kind: "deterministic_service_with_ai_planner"
    responsibilities:
      - "agent_selection"
      - "model_selection"
      - "session_placement"
      - "parallelism_control"
      - "lease_admission"
  - id: "work-session"
    kind: "ai_agent_session"
    responsibilities:
      - "execute_work_item"
      - "submit_checkpoint"
      - "register_evidence"
      - "return_blocker"
  - id: "reviewer"
    kind: "ai_agent_session"
    responsibilities:
      - "independent_review"
      - "finding_submit"
      - "reverify"
  - id: "qa"
    kind: "ai_agent_session"
    responsibilities:
      - "test_matrix_execution"
      - "evidence_collection"
      - "regression_validation"
  - id: "security"
    kind: "ai_agent_session"
    responsibilities:
      - "secret_review"
      - "mcp_grant_review"
      - "network_policy_review"
      - "supply_chain_review"
  - id: "release"
    kind: "ai_agent_session"
    responsibilities:
      - "integration_batch"
      - "release_manifest"
      - "rollback_plan"
  - id: "rule-steward"
    kind: "ai_agent_session"
    responsibilities:
      - "rule_candidate"
      - "rule_review"
      - "ruleset_publish"
      - "system_upgrade_candidate_review"
  - id: "monitor"
    kind: "autonomous_service_agent"
    responsibilities:
      - "heartbeat_monitor"
      - "dlq_monitor"
      - "lease_monitor"
      - "cost_monitor"
      - "alert_route"
      - "runtime_issue_pattern_collection"
  - id: "agent-runtime"
    kind: "system_service"
    responsibilities:
      - "node_probe"
      - "session_start"
      - "checkpoint_upload"
      - "outbox_recovery"
  - id: "command-bus"
    kind: "system_service"
    responsibilities:
      - "command_dispatch"
      - "retry"
      - "dlq_route"
  - id: "permission-gateway"
    kind: "system_service"
    responsibilities:
      - "permission_classification"
      - "capability_route"
      - "resolution_delta"
  - id: "policy-engine"
    kind: "system_service"
    responsibilities:
      - "policy_evaluation"
      - "command_admission"
      - "grant_decision"
      - "policy_decision_record"
  - id: "mcp-proxy"
    kind: "system_service"
    responsibilities:
      - "tool_grant_check"
      - "param_policy_check"
      - "result_filter"
  - id: "room-broker"
    kind: "system_service"
    responsibilities:
      - "room_event_persist"
      - "cursor_delivery"
      - "ack_tracking"
  - id: "model-registry"
    kind: "system_service"
    responsibilities:
      - "provider_probe"
      - "capability_profile_index"
      - "model_selection_decision"
  - id: "skill-registry"
    kind: "system_service"
    responsibilities:
      - "external_skill_source_sync"
      - "role_skill_parse"
      - "project_task_group_overlay"

requiredControlObjects:
  - "Project"
  - "TaskGroup"
  - "WorkItem"
  - "WorkSession"
  - "AgentNode"
  - "Room"
  - "RoomMessage"
  - "Command"
  - "CommandEffect"
  - "Lease"
  - "Checkpoint"
  - "Artifact"
  - "Finding"
  - "Contract"
  - "IntegrationBatch"
  - "PermissionRequest"
  - "ApprovalRequest"
  - "DecisionRecord"
  - "AuditLog"
  - "Alert"
  - "Ruleset"
  - "PolicyDecision"
  - "QualityGate"
  - "ChangeSet"
  - "MergeQueueItem"
  - "ReleaseManifest"
  - "DLQEntry"
  - "SecretGrant"
  - "SecretLease"
  - "TempGrant"
  - "AgentSkillSource"
  - "AgentRoleSkill"
  - "RoleSkillOverlay"
  - "ModelProvider"
  - "ModelCapabilityProfile"
  - "ModelSelectionPolicy"
  - "ModelSelectionDecision"
  - "SessionPlacementPolicy"
  - "SessionPlacementDecision"
  - "RuntimeIssuePattern"
  - "SystemUpgradeCandidate"

