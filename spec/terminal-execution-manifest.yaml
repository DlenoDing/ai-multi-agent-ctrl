qualityGates:
  required:
    - "RequirementGate"
    - "ArchitectureGate"
    - "ContractGate"
    - "CodeGate"
    - "IntegrationGate"
    - "SecurityGate"
    - "EvidenceGate"
    - "ReverificationGate"
    - "ReleaseGate"
    - "OnlineQualityGate"
    - "CloseGate"

autoGitPolicy:
  commitWhen:
    - "work_item_done"
    - "schema_changed"
    - "docs_changed"
    - "checkpoint_required_before_wait"
  pushWhen:
    - "commit_created"
    - "handoff"
    - "close_candidate"
  forbidden:
    - "mix_unleased_changes"
    - "push_without_status_check"
    - "claim_done_without_evidence"
    - "missing_push_ref"
    - "dirty_paths_outside_write_scope"

completionContract:
  requiredFields:
    - "stateTransition"
    - "commitRef"
    - "pushRef"
    - "evidenceRefs"
    - "verificationRefs"
    - "openMachineActionIds"
  forbiddenPhrases:
    - "external_executor_required"
    - "not_machine_actionable"
    - "理论上可以"
    - "未验证但应该可用"
    - "waiting_for_non_system_path"
    - "no_evidence_available"
    - "self_verified"
    - "future_implementation_only"
    - "external_confirmation_required"
    - "untested_assertion"
    - "missing_independent_review"
